<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimiro AI - Authentication</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #065f46 0%, #047857 50%, #059669 100%);
        }

        .leaf-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23059669' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .tab-active {
            color: #059669;
            border-bottom: 2px solid #059669;
        }

        .tab-inactive {
            color: #78716c;
            border-bottom: 2px solid transparent;
        }

        .tab-inactive:hover {
            color: #44403c;
            border-bottom: 2px solid #d6d3d1;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="text-stone-800 bg-stone-50 min-h-screen flex flex-col font-sans">

    <!-- Navigation (Simplified for Auth Page) -->
    <nav class="w-full bg-white border-b border-stone-200 py-4 absolute top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-3 group">
                    <div
                        class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center group-hover:bg-emerald-700 transition-colors">
                        <i data-lucide="sprout" class="w-6 h-6 text-white"></i>
                    </div>
                    <span class="text-2xl font-bold text-emerald-900">Nimiro AI</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main
        class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden hero-gradient">
        <div class="absolute inset-0 leaf-pattern opacity-30"></div>
        <div class="absolute top-20 right-0 w-96 h-96 bg-white opacity-5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-yellow-300 opacity-10 rounded-full blur-3xl"></div>

        <div
            class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative z-10 fade-in border border-white/20">
            <!-- Header section of the card -->
            <div class="px-8 pt-8 pb-6 text-center">
                <h2 class="text-2xl font-bold text-stone-800" id="auth-title">Welcome Back</h2>
                <p class="text-sm text-stone-500 mt-2" id="auth-subtitle">Sign in to your Nimiro AI dashboard</p>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-stone-200 px-8">
                <button onclick="switchTab('signin')" id="tab-signin"
                    class="flex-1 py-3 text-sm font-semibold tab-active transition-all">Sign In</button>
                <button onclick="switchTab('signup')" id="tab-signup"
                    class="flex-1 py-3 text-sm font-semibold tab-inactive transition-all">Register</button>
            </div>

            <div class="p-8">
                <!-- Sign In Form -->
                <form id="form-signin" class="space-y-5 fade-in block" action="{% url 'dashboard-page' %}">
                    {% csrf_token %}
                    <div>
                        <label for="signin-email" class="block text-sm font-medium text-stone-700 mb-1">Email
                            Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="h-5 w-5 text-stone-400"></i>
                            </div>
                            <input type="email" id="signin-email" name="email"
                                class="block w-full pl-10 pr-3 py-2.5 border border-stone-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500 text-stone-900 transition-colors bg-stone-50 focus:bg-white"
                                placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <label for="signin-password"
                                class="block text-sm font-medium text-stone-700">Password</label>
                            <a href="#"
                                class="text-xs font-medium text-emerald-600 hover:text-emerald-500 transition-colors">Forgot
                                password?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="h-5 w-5 text-stone-400"></i>
                            </div>
                            <input type="password" id="signin-password" name="password"
                                class="block w-full pl-10 pr-10 py-2.5 border border-stone-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500 text-stone-900 transition-colors bg-stone-50 focus:bg-white"
                                placeholder="••••••••" required>
                            <button type="button" onclick="togglePassword('signin-password')"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-stone-400 hover:text-emerald-600 transition-colors">
                                <i data-lucide="eye" class="h-5 w-5"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                            class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-stone-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-stone-600">
                            Remember me for 30 days
                        </label>
                    </div>

                    <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-all hover:shadow-lg hover:shadow-emerald-200">
                        Sign In to Dashboard
                    </button>

                    <div class="mt-6">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-stone-200"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white text-stone-500">Or continue with</span>
                            </div>
                        </div>

                        <div class="mt-6 grid grid-cols-2 gap-3">
                            <button type="button"
                                class="w-full inline-flex justify-center py-2.5 px-4 border border-stone-300 rounded-xl shadow-sm bg-white text-sm font-medium text-stone-700 hover:bg-stone-50 transition-colors">
                                <svg class="h-5 w-5" aria-hidden="true" viewBox="0 0 24 24">
                                    <path
                                        d="M12.0003 4.75C13.7703 4.75 15.3553 5.36002 16.6053 6.54998L20.0303 3.125C17.9502 1.19 15.2353 0 12.0003 0C7.31028 0 3.25527 2.69 1.28027 6.60998L5.27028 9.70498C6.21525 6.86002 8.87028 4.75 12.0003 4.75Z"
                                        fill="#EA4335"></path>
                                    <path
                                        d="M23.49 12.275C23.49 11.49 23.415 10.73 23.3 10H12V14.51H18.47C18.47 15.19 18.18 15.99 17.34 17.25 16.08 18.1L19.945 21.1C22.2 19.01 23.49 15.92 23.49 12.275Z"
                                        fill="#4285F4"></path>
                                    <path
                                        d="M5.26498 14.2949C5.02498 13.5699 4.88501 12.7999 4.88501 11.9999C4.88501 11.1999 5.01998 10.4299 5.26498 9.7049L1.275 6.60986C0.46 8.22986 0 10.0599 0 11.9999C0 13.9399 0.46 15.7699 1.28 17.3899L5.26498 14.2949Z"
                                        fill="#FBBC05"></path>
                                    <path
                                        d="M12.0004 24.0001C15.2404 24.0001 17.9654 22.935 19.9454 21.095L16.0804 18.095C15.0054 18.82 13.6204 19.245 12.0004 19.245C8.8704 19.245 6.21537 17.135 5.26538 14.29L1.27539 17.385C3.25539 21.31 7.3104 24.0001 12.0004 24.0001Z"
                                        fill="#34A853"></path>
                                </svg>
                            </button>
                            <button type="button"
                                class="w-full inline-flex justify-center py-2.5 px-4 border border-stone-300 rounded-xl shadow-sm bg-white text-sm font-medium text-stone-700 hover:bg-stone-50 transition-colors">
                                <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24">
                                    <path
                                        d="M13.397 20.997v-8.196h2.765l.411-3.209h-3.176V7.548c0-.926.258-1.56 1.587-1.56h1.684V3.127A22.336 22.336 0 0 0 14.201 3c-2.444 0-4.122 1.492-4.122 4.231v2.355H7.332v3.209h2.753v8.202h3.312z">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </form>

                <!-- Sign Up Form -->
                <form id="form-signup" class="space-y-4 fade-in hidden" action="{% url 'dashboard-page' %}">
                    {% csrf_token %}
                    <div>
                        <label for="signup-name" class="block text-sm font-medium text-stone-700 mb-1">Full Name</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="user" class="h-5 w-5 text-stone-400"></i>
                            </div>
                            <input type="text" id="signup-name" name="name"
                                class="block w-full pl-10 pr-3 py-2.5 border border-stone-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500 text-stone-900 transition-colors bg-stone-50 focus:bg-white"
                                placeholder="John Doe">
                        </div>
                    </div>

                    <div>
                        <label for="signup-email" class="block text-sm font-medium text-stone-700 mb-1">Email
                            Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="h-5 w-5 text-stone-400"></i>
                            </div>
                            <input type="email" id="signup-email" name="email"
                                class="block w-full pl-10 pr-3 py-2.5 border border-stone-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500 text-stone-900 transition-colors bg-stone-50 focus:bg-white"
                                placeholder="you@example.com">
                        </div>
                    </div>

                    <div>
                        <label for="signup-password"
                            class="block text-sm font-medium text-stone-700 mb-1">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="h-5 w-5 text-stone-400"></i>
                            </div>
                            <input type="password" id="signup-password" name="password"
                                class="block w-full pl-10 pr-10 py-2.5 border border-stone-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500 text-stone-900 transition-colors bg-stone-50 focus:bg-white"
                                placeholder="Create a password">
                            <button type="button" onclick="togglePassword('signup-password')"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-stone-400 hover:text-emerald-600 transition-colors">
                                <i data-lucide="eye" class="h-5 w-5"></i>
                            </button>
                        </div>
                        <p class="mt-1 text-xs text-stone-500">Must be at least 8 characters</p>
                    </div>

                    <div>
                        <label for="signup-confirm" class="block text-sm font-medium text-stone-700 mb-1">Confirm
                            Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="check-circle" class="h-5 w-5 text-stone-400"></i>
                            </div>
                            <input type="password" id="signup-confirm" name="confirm-password"
                                class="block w-full pl-10 pr-10 py-2.5 border border-stone-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500 text-stone-900 transition-colors bg-stone-50 focus:bg-white"
                                placeholder="Confirm your password">
                            <button type="button" onclick="togglePassword('signup-confirm')"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-stone-400 hover:text-emerald-600 transition-colors">
                                <i data-lucide="eye" class="h-5 w-5"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-start mt-4">
                        <div class="flex items-center h-5">
                            <input id="terms" name="terms" type="checkbox"
                                class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-stone-300 rounded"
                                required>
                        </div>
                        <div class="ml-2 text-sm">
                            <label for="terms" class="font-medium text-stone-600">I agree to the <a href="#"
                                    class="text-emerald-600 hover:underline">Terms</a>, <a href="#"
                                    class="text-emerald-600 hover:underline">Privacy Policy</a></label>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-amber-500 hover:bg-amber-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 transition-all hover:shadow-lg mt-6">
                        Create Account
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        function switchTab(tab) {
            const signinForm = document.getElementById('form-signin');
            const signupForm = document.getElementById('form-signup');
            const signinTab = document.getElementById('tab-signin');
            const signupTab = document.getElementById('tab-signup');
            const authTitle = document.getElementById('auth-title');
            const authSubtitle = document.getElementById('auth-subtitle');

            if (tab === 'signin') {
                // Show Sign In, Hide Sign Up
                signinForm.classList.remove('hidden');
                signupForm.classList.add('hidden');

                // Update Tab Styles
                signinTab.className = 'flex-1 py-3 text-sm font-semibold tab-active transition-all';
                signupTab.className = 'flex-1 py-3 text-sm font-semibold tab-inactive transition-all';

                // Update Text
                authTitle.innerText = 'Welcome Back';
                authSubtitle.innerText = 'Sign in to your Nimiro AI dashboard';
            } else {
                // Show Sign Up, Hide Sign In
                signupForm.classList.remove('hidden');
                signinForm.classList.add('hidden');

                // Update Tab Styles
                signupTab.className = 'flex-1 py-3 text-sm font-semibold tab-active transition-all';
                signinTab.className = 'flex-1 py-3 text-sm font-semibold tab-inactive transition-all';

                // Update Text
                authTitle.innerText = 'Create an Account';
                authSubtitle.innerText = 'Join Nimiro AI to start smart farming';
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }

            // Re-initialize this specific icon
            lucide.createIcons({
                icons: {
                    Eye: lucide.icons.Eye,
                    EyeOff: lucide.icons.EyeOff
                },
                nameAttr: 'data-lucide'
            });
        }
    </script>
</body>

</html>
